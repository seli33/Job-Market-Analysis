What we need to do next is inspect a detail page (when you click into one specific job).
Think of it like this:
Listing page                    Detail page
─────────────────               ─────────────────────────────
kumarijob.com/it-jobs    →      kumarijob.com/company/12345-job-title
  - job title                     - full description
  - company                       - salary
  - location                      - deadline
                                  - experience required
                                  - education
Your current script already gets you the left side. We already have that data (187 jobs). Now we need to go one level deeper into each job.
