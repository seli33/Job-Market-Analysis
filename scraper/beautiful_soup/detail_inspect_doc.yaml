│  We are looking for a QA Engineer to join...        │
│  Responsibilities:                                  │
│    - Write test cases                               │
│    - ...                                            │
│  Requirements:                                      │
│    - Python, Selenium                               │
│    - ...                                            │
└─────────────────────────────────────────────────────┘

All of that extra information — salary, deadline, description — only exists on the detail page. It's not on the listing page at all.